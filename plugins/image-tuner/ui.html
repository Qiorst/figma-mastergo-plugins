<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Image Tuner</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #2563eb;
      --accent-strong: #1748b5;
      --danger: #b42318;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 12px/1.45 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .status {
      min-height: 34px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .status strong {
      display: block;
      color: var(--text);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status.error {
      color: var(--danger);
      border-color: #f4c7c1;
      background: #fff7f6;
    }

    .preview {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 190px;
      max-height: 240px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(45deg, #e8ebef 25%, transparent 25%),
        linear-gradient(-45deg, #e8ebef 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e8ebef 75%),
        linear-gradient(-45deg, transparent 75%, #e8ebef 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 238px;
    }

    .empty {
      max-width: 280px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      overflow-wrap: anywhere;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 11px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .group-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .control {
      display: grid;
      grid-template-columns: 82px 1fr 44px;
      align-items: center;
      gap: 10px;
    }

    label {
      color: var(--text);
      font-weight: 560;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    output {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button:hover:not(:disabled) { border-color: var(--accent); }
    button.primary:hover:not(:disabled) { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: 0.45; }

    .footer {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <h1>Image Tuner</h1>
      <div class="header-actions">
        <button id="languageButton" type="button">EN</button>
        <button id="refreshButton" type="button" data-i18n="refresh">刷新</button>
      </div>
    </div>

    <section id="status" class="status">请选择一个图片图层。</section>

    <section class="preview">
      <canvas id="canvas" hidden></canvas>
      <div id="empty" class="empty" data-i18n="empty">图片预览会显示在这里。</div>
    </section>

    <section class="controls" aria-label="Light controls">
      <div class="group-title" data-i18n="light">光效</div>
      <div class="control">
        <label for="exposure" data-i18n="exposure">曝光</label>
        <input id="exposure" type="range" min="-100" max="100" value="0" />
        <output for="exposure">0</output>
      </div>
      <div class="control">
        <label for="contrast" data-i18n="contrast">对比度</label>
        <input id="contrast" type="range" min="-100" max="100" value="0" />
        <output for="contrast">0</output>
      </div>
      <div class="control">
        <label for="highlights" data-i18n="highlights">高光</label>
        <input id="highlights" type="range" min="-100" max="100" value="0" />
        <output for="highlights">0</output>
      </div>
      <div class="control">
        <label for="shadows" data-i18n="shadows">阴影</label>
        <input id="shadows" type="range" min="-100" max="100" value="0" />
        <output for="shadows">0</output>
      </div>
      <div class="control">
        <label for="whites" data-i18n="whites">白色色阶</label>
        <input id="whites" type="range" min="-100" max="100" value="0" />
        <output for="whites">0</output>
      </div>
      <div class="control">
        <label for="blacks" data-i18n="blacks">黑色色阶</label>
        <input id="blacks" type="range" min="-100" max="100" value="0" />
        <output for="blacks">0</output>
      </div>
    </section>

    <section class="controls" aria-label="Color controls">
      <div class="group-title" data-i18n="color">颜色</div>
      <div class="control">
        <label for="temperature" data-i18n="temperature">色温</label>
        <input id="temperature" type="range" min="-100" max="100" value="0" />
        <output for="temperature">0</output>
      </div>
      <div class="control">
        <label for="tint" data-i18n="tint">色调</label>
        <input id="tint" type="range" min="-100" max="100" value="0" />
        <output for="tint">0</output>
      </div>
      <div class="control">
        <label for="vibrance" data-i18n="vibrance">自然饱和度</label>
        <input id="vibrance" type="range" min="-100" max="100" value="0" />
        <output for="vibrance">0</output>
      </div>
      <div class="control">
        <label for="saturation" data-i18n="saturation">饱和度</label>
        <input id="saturation" type="range" min="-100" max="100" value="0" />
        <output for="saturation">0</output>
      </div>
      <div class="control">
        <label for="hue" data-i18n="hue">色相</label>
        <input id="hue" type="range" min="-180" max="180" value="0" />
        <output for="hue">0</output>
      </div>
    </section>

    <section class="controls" aria-label="Effects controls">
      <div class="group-title" data-i18n="effects">效果</div>
      <div class="control">
        <label for="grain" data-i18n="grain">颗粒</label>
        <input id="grain" type="range" min="0" max="100" value="0" />
        <output for="grain">0</output>
      </div>
      <div class="control">
        <label for="vignette" data-i18n="vignette">暗角</label>
        <input id="vignette" type="range" min="-100" max="100" value="0" />
        <output for="vignette">0</output>
      </div>
    </section>

    <section class="actions">
      <button id="resetButton" type="button" data-i18n="reset">重置</button>
      <button id="applyButton" class="primary" type="button" disabled data-i18n="apply">应用</button>
    </section>

    <div id="debug" class="footer">界面已加载，等待插件主程序...</div>
  </main>

  <script>
    const state = {
      image: null,
      nodeName: "",
      mode: "none",
      values: {
        exposure: 0,
        contrast: 0,
        highlights: 0,
        shadows: 0,
        whites: 0,
        blacks: 0,
        temperature: 0,
        tint: 0,
        vibrance: 0,
        saturation: 0,
        hue: 0,
        grain: 0,
        vignette: 0
      },
      pendingAppliedBytes: null,
      isApplying: false,
      queuedAutoApply: false,
      autoApplyTimer: null,
      renderToken: 0,
      language: "zh",
      statusKey: "selectOne",
      statusIsError: false
    };

    const translations = {
      zh: {
        refresh: "刷新",
        empty: "图片预览会显示在这里。",
        light: "光效",
        exposure: "曝光",
        contrast: "对比度",
        highlights: "高光",
        shadows: "阴影",
        whites: "白色色阶",
        blacks: "黑色色阶",
        color: "颜色",
        temperature: "色温",
        tint: "色调",
        vibrance: "自然饱和度",
        saturation: "饱和度",
        hue: "色相",
        effects: "效果",
        grain: "颗粒",
        vignette: "暗角",
        reset: "重置",
        apply: "应用",
        applying: "应用中",
        imageLoaded: "图片已加载",
        selectedLayer: "已选择图层",
        image: "图片",
        selectOne: "请选择一个图片图层。",
        noPreview: "没有预览。",
        noPreviewData: "没有预览数据。",
        noDiagnostics: "没有诊断信息。",
        readingPreview: "正在读取预览数据...",
        sourceChanged: "图片来源已变化，参数已重置。",
        ready: "可以开始调整。",
        readyAgain: "可以继续调整。",
        restored: "已恢复原图。",
        resetClicked: "已点击重置，正在恢复原图...",
        refreshClicked: "已点击刷新，正在重新读取选中图层。",
        uiWaiting: "界面已加载，等待插件主程序...",
        uiRefreshSent: "界面已加载，已请求读取选中图层。",
        autoApplying: "正在自动应用...",
        manualApplying: "正在应用...",
        applyFailed: "应用失败。",
        imageReadFailed: "图片读取失败。",
        imageBytesMissing: "插件宿主没有返回图片数据。",
        imageExportFailed: "图片导出失败。",
        previewLoadFailed: "图片预览加载失败。"
      },
      en: {
        refresh: "Refresh",
        empty: "Image preview will appear here.",
        light: "Light",
        exposure: "Exposure",
        contrast: "Contrast",
        highlights: "Highlights",
        shadows: "Shadows",
        whites: "Whites",
        blacks: "Blacks",
        color: "Color",
        temperature: "Temp",
        tint: "Tint",
        vibrance: "Vibrance",
        saturation: "Saturation",
        hue: "Hue",
        effects: "Effects",
        grain: "Grain",
        vignette: "Vignette",
        reset: "Reset",
        apply: "Apply",
        applying: "Applying",
        imageLoaded: "Image loaded",
        selectedLayer: "Selected layer",
        image: "Image",
        selectOne: "Select one image layer.",
        noPreview: "No preview.",
        noPreviewData: "No preview data.",
        noDiagnostics: "No diagnostics.",
        readingPreview: "Reading preview data...",
        sourceChanged: "Image source changed. Params reset.",
        ready: "Ready to tune.",
        readyAgain: "Ready for another adjustment.",
        restored: "Restored original image.",
        resetClicked: "Reset clicked. Restoring original image...",
        refreshClicked: "Refresh clicked. Sent refresh-selection.",
        uiWaiting: "UI loaded. Waiting for plugin main...",
        uiRefreshSent: "UI loaded. Sent refresh-selection.",
        autoApplying: "Auto applying...",
        manualApplying: "Applying...",
        applyFailed: "Apply failed.",
        imageReadFailed: "Image read failed.",
        imageBytesMissing: "No image bytes were received from the plugin host.",
        imageExportFailed: "Image export failed.",
        previewLoadFailed: "Preview image failed to load."
      }
    };

    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d", { willReadFrequently: true });
    const emptyEl = document.getElementById("empty");
    const applyButton = document.getElementById("applyButton");
    const resetButton = document.getElementById("resetButton");
    const refreshButton = document.getElementById("refreshButton");
    const languageButton = document.getElementById("languageButton");
    const debugEl = document.getElementById("debug");
    const controls = Array.from(document.querySelectorAll("input[type='range']"));

    function t(key) {
      const dictionary = translations[state.language] || translations.zh;
      return dictionary[key] || translations.en[key] || key;
    }

    function translateErrorMessage(message) {
      if (!message) return "";
      if (translations.en[message] || translations.zh[message]) return t(message);
      if (message.startsWith("previewLoadFailed ")) {
        return message.replace("previewLoadFailed", t("previewLoadFailed"));
      }
      const exactMatches = {
        "No image bytes were received from the plugin host.": "imageBytesMissing",
        "Image export failed.": "imageExportFailed"
      };
      if (exactMatches[message]) return t(exactMatches[message]);
      if (message.startsWith("Preview image failed to load.")) {
        return message.replace("Preview image failed to load.", t("previewLoadFailed"));
      }
      if (message === "Apply failed.") return t("applyFailed");
      if (message === "Image read failed.") return t("imageReadFailed");
      return message;
    }

    function setLanguage(language) {
      state.language = language === "en" ? "en" : "zh";
      document.documentElement.lang = state.language === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
      languageButton.textContent = state.language === "zh" ? "EN" : "中文";
      languageButton.setAttribute("aria-label", state.language === "zh" ? "Switch to English" : "切换到中文");
      if (!state.image && !state.statusIsError) emptyEl.textContent = t("empty");
      setStatus(state.statusKey, state.statusIsError);
    }

    function post(message) {
      parent.postMessage(message, "*");
      parent.postMessage({ pluginMessage: message }, "*");
    }

    function clamp(value) {
      return Math.max(0, Math.min(255, value));
    }

    function normalizeBytes(input) {
      if (!input) return new Uint8Array();
      if (input instanceof Uint8Array) return input;
      if (input instanceof ArrayBuffer) return new Uint8Array(input);
      if (Array.isArray(input)) return new Uint8Array(input);
      if (input.buffer instanceof ArrayBuffer) return new Uint8Array(input.buffer);
      if (typeof input === "string") {
        const base64 = input.includes(",") ? input.split(",").pop() : input;
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }
      return new Uint8Array();
    }

    function byteSignature(bytes) {
      return Array.from(bytes.slice(0, 8)).map((value) => value.toString(16).padStart(2, "0")).join(" ");
    }

    function setStatus(message, isError = false) {
      state.statusKey = message;
      state.statusIsError = isError;
      const translatedMessage = t(message) === message ? translateErrorMessage(message) : t(message);
      statusEl.classList.toggle("error", isError);
      statusEl.textContent = "";
      if (isError) {
        statusEl.textContent = translatedMessage;
      } else {
        const title = document.createElement("strong");
        title.textContent = state.nodeName || t("imageLoaded");
        statusEl.append(title, translatedMessage);
      }
    }

    function setControlsEnabled(enabled) {
      controls.forEach((control) => { control.disabled = !enabled; });
      applyButton.disabled = !enabled;
      resetButton.disabled = !enabled;
    }

    function updateOutputs() {
      controls.forEach((control) => { control.nextElementSibling.value = control.value; });
    }

    function resetValues() {
      state.values = getDefaultValues();
      controls.forEach((control) => { control.value = state.values[control.id]; });
      updateOutputs();
    }

    function getDefaultValues() {
      return {
        exposure: 0,
        contrast: 0,
        highlights: 0,
        shadows: 0,
        whites: 0,
        blacks: 0,
        temperature: 0,
        tint: 0,
        vibrance: 0,
        saturation: 0,
        hue: 0,
        grain: 0,
        vignette: 0
      };
    }

    function setValues(values) {
      const next = getDefaultValues();
      Object.keys(next).forEach((key) => {
        next[key] = Number(values && values[key]) || 0;
      });
      if (values && values.brightness && !next.exposure) {
        next.exposure = Number(values.brightness) || 0;
      }
      state.values = next;
      controls.forEach((control) => { control.value = state.values[control.id]; });
      updateOutputs();
    }

    function hueRotate(r, g, b, degrees) {
      const angle = degrees * Math.PI / 180;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return [
        r * (0.213 + cos * 0.787 - sin * 0.213) + g * (0.715 - cos * 0.715 - sin * 0.715) + b * (0.072 - cos * 0.072 + sin * 0.928),
        r * (0.213 - cos * 0.213 + sin * 0.143) + g * (0.715 + cos * 0.285 + sin * 0.140) + b * (0.072 - cos * 0.072 - sin * 0.283),
        r * (0.213 - cos * 0.213 - sin * 0.787) + g * (0.715 - cos * 0.715 + sin * 0.715) + b * (0.072 + cos * 0.928 + sin * 0.072)
      ];
    }

    function applyTone(value, luminance) {
      let result = value;
      const exposure = state.values.exposure * 2.25;
      const highlightWeight = smoothstep(0.45, 1, luminance);
      const shadowWeight = 1 - smoothstep(0, 0.55, luminance);
      const whiteWeight = smoothstep(0.72, 1, luminance);
      const blackWeight = 1 - smoothstep(0, 0.28, luminance);

      result += exposure;
      result += state.values.highlights * 1.25 * highlightWeight;
      result += state.values.shadows * 1.25 * shadowWeight;
      result += state.values.whites * 1.1 * whiteWeight;
      result += state.values.blacks * 1.1 * blackWeight;
      return result;
    }

    function smoothstep(edge0, edge1, value) {
      const x = Math.max(0, Math.min(1, (value - edge0) / (edge1 - edge0)));
      return x * x * (3 - 2 * x);
    }

    function pseudoRandom(x, y) {
      const seed = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
      return seed - Math.floor(seed);
    }

    function applyColorAdjustments(imageData) {
      const data = imageData.data;
      const contrast = (259 * (state.values.contrast + 255)) / (255 * (259 - state.values.contrast));
      const saturation = 1 + state.values.saturation / 100;
      const hue = state.values.hue;
      const temp = state.values.temperature;
      const tint = state.values.tint;
      const vibrance = state.values.vibrance / 100;
      const grainAmount = state.values.grain * 0.55;
      const vignetteAmount = state.values.vignette / 100;
      const width = imageData.width;
      const height = imageData.height;
      const cx = width / 2;
      const cy = height / 2;
      const maxDistance = Math.sqrt(cx * cx + cy * cy);

      for (let i = 0; i < data.length; i += 4) {
        const pixel = i / 4;
        const x = pixel % width;
        const y = Math.floor(pixel / width);
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];
        const originalGray = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 255;

        r = applyTone(r, originalGray);
        g = applyTone(g, originalGray);
        b = applyTone(b, originalGray);

        r += temp * 0.8 + tint * 0.15;
        g += -tint * 0.65;
        b += -temp * 0.8 + tint * 0.15;

        [r, g, b] = hueRotate(r, g, b, hue);
        r = contrast * (r - 128) + 128;
        g = contrast * (g - 128) + 128;
        b = contrast * (b - 128) + 128;

        const gray = r * 0.2126 + g * 0.7152 + b * 0.0722;
        const maxChannel = Math.max(r, g, b);
        const minChannel = Math.min(r, g, b);
        const currentSat = maxChannel > 0 ? (maxChannel - minChannel) / maxChannel : 0;
        const vibranceFactor = 1 + vibrance * (1 - currentSat) * 1.4;
        let finalSaturation = saturation * vibranceFactor;

        r = gray + (r - gray) * finalSaturation;
        g = gray + (g - gray) * finalSaturation;
        b = gray + (b - gray) * finalSaturation;

        if (grainAmount > 0) {
          const noise = (pseudoRandom(x, y) - 0.5) * grainAmount;
          r += noise;
          g += noise;
          b += noise;
        }

        if (vignetteAmount !== 0) {
          const dx = x - cx;
          const dy = y - cy;
          const distance = Math.sqrt(dx * dx + dy * dy) / maxDistance;
          const vignetteWeight = smoothstep(0.2, 0.95, distance);
          const vignette = 1 + vignetteAmount * vignetteWeight;
          r *= vignette;
          g *= vignette;
          b *= vignette;
        }

        data[i] = clamp(r);
        data[i + 1] = clamp(g);
        data[i + 2] = clamp(b);
      }

      return imageData;
    }

    function renderPreview() {
      if (!state.image) return;
      const token = ++state.renderToken;
      requestAnimationFrame(() => {
        if (token !== state.renderToken) return;
        canvas.width = state.image.naturalWidth || state.image.width;
        canvas.height = state.image.naturalHeight || state.image.height;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.drawImage(state.image, 0, 0);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        context.putImageData(applyColorAdjustments(imageData), 0, 0);
      });
    }

    function loadImageFromBytes(rawBytes) {
      return new Promise((resolve, reject) => {
        const bytes = normalizeBytes(rawBytes);
        debugEl.textContent = `mode=${state.mode}, bytes=${bytes.length}, sig=${byteSignature(bytes)}`;

        if (!bytes.length) {
          reject(new Error("imageBytesMissing"));
          return;
        }

        const blob = new Blob([bytes], { type: "image/png" });
        const url = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error(`previewLoadFailed bytes=${bytes.length}, sig=${byteSignature(bytes)}`));
        };
        image.src = url;
      });
    }

    function canvasToBytes() {
      return new Promise((resolve, reject) => {
        canvas.toBlob(async (blob) => {
          if (!blob) {
            reject(new Error("imageExportFailed"));
            return;
          }
          resolve(new Uint8Array(await blob.arrayBuffer()));
        }, "image/png", 0.96);
      });
    }

    async function sendApply(mode = "manual") {
      if (!state.image || state.isApplying) {
        if (mode === "auto") state.queuedAutoApply = true;
        return;
      }

      state.isApplying = true;
      if (mode === "manual") {
        applyButton.disabled = true;
        applyButton.textContent = t("applying");
      }

      try {
        renderPreview();
        await new Promise((resolve) => requestAnimationFrame(resolve));
        const bytes = await canvasToBytes();
        state.pendingAppliedBytes = bytes;
        debugEl.textContent = mode === "auto" ? t("autoApplying") : t("manualApplying");
        post({ type: "apply-image", bytes, params: state.values, mode });
      } catch (error) {
        state.isApplying = false;
        setStatus(error.message || "applyFailed", true);
        if (mode === "manual") {
          applyButton.textContent = t("apply");
          applyButton.disabled = false;
        }
      }
    }

    function scheduleAutoApply() {
      window.clearTimeout(state.autoApplyTimer);
      state.autoApplyTimer = window.setTimeout(() => {
        sendApply("auto");
      }, 350);
    }

    controls.forEach((control) => {
      control.addEventListener("input", () => {
        state.values[control.id] = Number(control.value);
        updateOutputs();
        renderPreview();
        scheduleAutoApply();
      });
    });

    resetButton.addEventListener("click", () => {
      window.clearTimeout(state.autoApplyTimer);
      state.queuedAutoApply = false;
      resetValues();
      renderPreview();
      debugEl.textContent = t("resetClicked");
      post({ type: "reset-image" });
    });

    refreshButton.addEventListener("click", () => {
      debugEl.textContent = t("refreshClicked");
      post({ type: "refresh-selection" });
    });

    languageButton.addEventListener("click", () => {
      setLanguage(state.language === "zh" ? "en" : "zh");
    });

    applyButton.addEventListener("click", async () => {
      sendApply("manual");
    });

    window.onmessage = async (event) => {
      const message = event.data && event.data.pluginMessage ? event.data.pluginMessage : event.data;
      if (!message || !message.type) return;

      if (message.type === "selection-error") {
        state.image = null;
        state.nodeName = "";
        state.mode = "none";
        canvas.hidden = true;
        emptyEl.hidden = false;
        emptyEl.textContent = translateErrorMessage(message.message) || t("noPreview");
        debugEl.textContent = t("noPreviewData");
        setStatus(message.message || "noPreview", true);
        setControlsEnabled(false);
        return;
      }

      if (message.type === "selection-status") {
        debugEl.textContent = message.detail || t("noDiagnostics");
        if (!message.ok && message.source === "apply") {
          state.isApplying = false;
          applyButton.textContent = t("apply");
          applyButton.disabled = false;
        }
        if (message.ok) {
          state.nodeName = message.title || t("selectedLayer");
          setStatus("readingPreview");
        } else {
          state.image = null;
          state.nodeName = "";
          state.mode = "none";
          canvas.hidden = true;
          emptyEl.hidden = false;
          emptyEl.textContent = message.title || t("noPreview");
          setStatus(message.title || "noPreview", true);
          setControlsEnabled(false);
        }
        return;
      }

      if (message.type === "selection-image") {
        try {
          state.nodeName = message.nodeName || t("image");
          state.mode = message.mode || "unknown";
          state.image = await loadImageFromBytes(message.bytes);
          setValues(message.params);
          canvas.hidden = false;
          emptyEl.hidden = true;
          setStatus(message.sourceChanged ? "sourceChanged" : "ready");
          setControlsEnabled(true);
          renderPreview();
        } catch (error) {
        state.image = null;
        canvas.hidden = true;
        emptyEl.hidden = false;
          emptyEl.textContent = translateErrorMessage(error.message) || t("imageReadFailed");
          setStatus(error.message || "imageReadFailed", true);
        setControlsEnabled(false);
      }
      }

      if (message.type === "apply-complete") {
        state.isApplying = false;
        setValues(message.params || state.values);
        debugEl.textContent = message.detail || t("readyAgain");
        setStatus("readyAgain");
        setControlsEnabled(true);
        applyButton.textContent = t("apply");
        renderPreview();
        if (state.queuedAutoApply) {
          state.queuedAutoApply = false;
          scheduleAutoApply();
        }
      }

      if (message.type === "reset-complete") {
        state.pendingAppliedBytes = null;
        state.isApplying = false;
        state.queuedAutoApply = false;
        window.clearTimeout(state.autoApplyTimer);
        setValues(message.params);
        debugEl.textContent = message.detail || t("restored");
        setStatus("restored");
        setControlsEnabled(true);
        applyButton.textContent = t("apply");
      }
    };

    setControlsEnabled(false);
    updateOutputs();
    setLanguage("zh");
    debugEl.textContent = t("uiRefreshSent");
    post({ type: "refresh-selection" });
  </script>
</body>
</html>
